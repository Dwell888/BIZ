<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Insurance News Feed</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f6f8;
      margin:0;
      padding:0;
      color:#222;
    }

    header{
      background:#0b3d91;
      color:white;
      padding:20px;
      text-align:center;
    }

    .container{
      width:90%;
      max-width:1000px;
      margin:30px auto;
    }

    .article{
      background:white;
      margin-bottom:20px;
      padding:20px;
      border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
      transition:0.2s;
    }

    .article:hover{
      transform:translateY(-2px);
    }

    .article h2{
      margin-top:0;
      color:#0b3d91;
    }

    .article p{
      line-height:1.5;
    }

    .article a{
      display:inline-block;
      margin-top:10px;
      text-decoration:none;
      background:#0b3d91;
      color:white;
      padding:10px 15px;
      border-radius:6px;
    }

    .loading{
      text-align:center;
      padding:50px;
      font-size:20px;
    }
  </style>
</head>
<body>

<header>
  <h1>Insurance Industry News</h1>
  <p>Auto-updating latest headlines</p>
</header>

<div class="container">
  <div id="news" class="loading">Loading latest articles...</div>
</div>

<script>
async function loadNews() {
  const container = document.getElementById("news");

  try {
    const response = await fetch("https://businessinsurance-rss.unwit6.workers.dev/");
    const data = await response.json();

    container.innerHTML = "";

    data.articles.slice(0, 15).forEach(article => {
      const div = document.createElement("div");
      div.className = "article";

      div.innerHTML = `
        <h2>${article.title}</h2>

        <p>
          ${(article.description || "").slice(0, 250)}...
        </p>

        <small>
          Published:
          ${new Date(article.pubDate).toLocaleString()}
        </small>

        <br>

        <a href="${article.link}" target="_blank" rel="noopener noreferrer">
          Read Original Article
        </a>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    container.innerHTML = "<p>Failed to load articles.</p>";
    console.error(err);
  }
}

loadNews();
</script>

</body>
</html>
