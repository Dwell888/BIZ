<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insurance News Feed</title>

  <style>
    body {
      margin: 0;
      background: #f3f5f7;
      font-family: Arial, sans-serif;
    }

    header {
      background: #003366;
      color: white;
      padding: 25px;
      text-align: center;
    }

    .container {
      width: 90%;
      max-width: 1000px;
      margin: 30px auto;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin-top: 0;
      color: #003366;
    }

    .card p {
      line-height: 1.5;
    }

    .card a {
      display: inline-block;
      margin-top: 12px;
      background: #003366;
      color: white;
      padding: 10px 14px;
      border-radius: 6px;
      text-decoration: none;
    }

    .loading {
      text-align: center;
      font-size: 20px;
      padding: 50px;
    }

    .error {
      color: red;
      text-align: center;
      padding: 40px;
    }
  </style>
</head>
<body>

<header>
  <h1>Live Insurance News</h1>
  <p>Updates automatically every refresh</p>
</header>

<div class="container">
  <div id="news" class="loading">Loading articles...</div>
</div>

<script>
async function fetchNews() {

  const newsContainer = document.getElementById("news");

  try {

    // Google News RSS about insurance industry
    const rssFeed =
      encodeURIComponent(
        "https://news.google.com/rss/search?q=insurance+industry"
      );

    // CORS-friendly RSS parser
    const api =
      `https://api.allorigins.win/raw?url=https://rss2json.com/api.json?rss_url=${rssFeed}`;

    const response = await fetch(api);

    if (!response.ok) {
      throw new Error("Network response failed");
    }

    const data = await response.json();

    if (!data.items || data.items.length === 0) {
      throw new Error("No articles found");
    }

    newsContainer.innerHTML = "";

    data.items.slice(0, 12).forEach(article => {

      const card = document.createElement("div");
      card.className = "card";

      const description =
        article.description
          .replace(/<[^>]+>/g, "")
          .slice(0, 220);

      card.innerHTML = `
        <h2>${article.title}</h2>

        <p>${description}...</p>

        <small>
          ${new Date(article.pubDate).toLocaleString()}
        </small>

        <br>

        <a href="${article.link}" target="_blank">
          Read Full Article
        </a>
      `;

      newsContainer.appendChild(card);

    });

  } catch (error) {

    console.error(error);

    newsContainer.innerHTML = `
      <div class="error">
        Failed to load articles.<br><br>
        Possible reasons:
        <ul style="text-align:left; display:inline-block;">
          <li>CORS blocking</li>
          <li>RSS API temporary outage</li>
          <li>Running from local file system</li>
        </ul>

        Try hosting on:
        <br><br>
        • Netlify<br>
        • Vercel<br>
        • GitHub Pages
      </div>
    `;
  }
}

fetchNews();
</script>

</body>
</html>
