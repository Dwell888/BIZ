<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insurance News Feed</title>

  <style>
    body {
      margin: 0;
      background: #f3f5f7;
      font-family: Arial, sans-serif;
    }

    header {
      background: #003366;
      color: white;
      padding: 25px;
      text-align: center;
    }

    .container {
      width: 90%;
      max-width: 1000px;
      margin: 30px auto;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin-top: 0;
      color: #003366;
    }

    .card p {
      line-height: 1.5;
    }

    .card a {
      display: inline-block;
      margin-top: 12px;
      background: #003366;
      color: white;
      padding: 10px 14px;
      border-radius: 6px;
      text-decoration: none;
    }

    .loading {
      text-align: center;
      font-size: 20px;
      padding: 50px;
    }

    .error {
      color: red;
      text-align: center;
      padding: 40px;
    }
  </style>
</head>
<body>

<header>
  <h1>Live Insurance News</h1>
  <p>Updates automatically every refresh</p>
</header>

<div class="container">
  <div id="news" class="loading">Loading articles...</div>
</div>

<script>
async function fetchNews() {

  const newsContainer = document.getElementById("news");

  try {

    // Free public news API
    const url =
      "https://api.spaceflightnewsapi.net/v4/articles/?limit=12";

    const response = await fetch(url);

    if (!response.ok) {
      throw new Error("Failed to fetch");
    }

    const data = await response.json();

    newsContainer.innerHTML = "";

    data.results.forEach(article => {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h2>${article.title}</h2>

        <p>
          ${article.summary.slice(0, 220)}...
        </p>

        <small>
          ${new Date(article.published_at).toLocaleString()}
        </small>

        <br><br>

        <a href="${article.url}" target="_blank">
          Read Full Article
        </a>
      `;

      newsContainer.appendChild(card);

    });

  } catch (error) {

    console.error(error);

    newsContainer.innerHTML = `
      <div class="error">
        Failed to load articles.<br><br>
        Check browser console for details.
      </div>
    `;
  }
}

fetchNews();
</script>

</body>
</html>
